<h2 class="font-bold text-2xl mb-9">Here are some of my personal projects</h2>
<div class="grid grid-rows-12 grid-flow-col gap-6">
    <div class="rounded-lg shadow-lg bg-white max-w-sm" *ngFor="let project of projects">
        <img class="rounded-t-lg" [src]="project.image" alt="Project Image" />
        <div class="flex flex-col p-6">
            <h5 class="text-gray-900 text-xl font-medium mb-2">{{project.name}}</h5>
            <p class="text-gray-700 text-base mb-4 h-16">
                {{project.description}}
            </p>
            <p *ngIf="project.urlDeploy" class="mt-0 mb-2">
                <span class="font-bold text-blue-600 hover:text-blue-900">
                    <a [href]="project.urlDeploy" target="__blank">Live demo
                        <span class="material-symbols-outlined text-sm">
                            open_in_new
                        </span>
                    </a>
                </span>
            </p>
            <div class="flex space-x-2 justify-start items-end mt-5">
                 <img class="w-10" *ngIf="project.inAngular"
                                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Angular_full_color_logo.svg/2048px-Angular_full_color_logo.svg.png"
                                    alt="Angular Logo"
                >
                <img class="w-10" *ngIf="project.inNextjs"
                                    src="https://www.rlogical.com/wp-content/uploads/2021/08/Rlogical-Blog-Images-thumbnail.png" 
                                    alt="NextJS Logo"
                >
                <a *ngIf="project.githubRepo" [href]="project.githubRepo" target="__blank">
                    <img    class="w-10" 
                            src="https://cdn-icons-png.flaticon.com/512/25/25231.png" 
                            alt="Github Logo"
                    >
                </a>
            </div>
        </div>
    </div>
</div>
