<div class="container mx-auto p-12">
    <h2 class="font-bold text-white text-3xl mb-9">
        Here are some of my personal projects 👇
    </h2>

    <div class="flex flex-col md:flex-row flex-wrap gap-12">
        <div class="card w-auto lg:w-96 bg-white shadow-xl" *ngFor="let project of projects">
            <figure>
                <img [src]="project.image" alt="A capture of the project" />
            </figure>
            <div class="card-body">
                <h2 class="text-black card-title">{{ project.name }}</h2>
                <p>{{ project.description }}</p>
                <div class="flex space-x-2 justify-start items-end mt-2">
                    <img class="w-10" *ngIf="project.inAngular"
                        src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Angular_full_color_logo.svg/2048px-Angular_full_color_logo.svg.png"
                        alt="Angular Logo" />
                    <img class="w-10" *ngIf="project.inNextjs"
                        src="https://www.rlogical.com/wp-content/uploads/2021/08/Rlogical-Blog-Images-thumbnail.png"
                        alt="NextJS Logo" />
                    <a *ngIf="project.githubRepo" [href]="project.githubRepo" target="__blank">
                        <img class="w-10" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Github Logo" />
                    </a>
                </div>
                <hr class="my-3">
                <div class="card-actions justify-end">
                    <a [href]="project.urlDeploy" target="__blank">
                        <button class="btn btn-primary">Visit demo</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
