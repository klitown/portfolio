<div class="container-2xl scroll-smooth">

    <div class="flex flex-row">

        <div class="basis-20 bg-white border-r-2 border-gray-200 flex-col shadow-lg">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-2 mt-3">
                        <div class="cursor-pointer rounded-full bg-gray-300 flex justify-center items-center" style="height: 3rem; width: 3rem;"
                            matTooltip="HOME PAGE"
                            [matTooltipPosition]="'after'"
                        >
                            <span class="font-bold text-emerald-600 text-3xl material-symbols-outlined">
                                home
                            </span>
                        </div>
                    </div>
                    <div class="absolute left-2 mt-20">
                        <div class="cursor-pointer rounded-full bg-gray-300 flex justify-center items-center" style="height: 3rem; width: 3rem;"
                            matTooltip="Other tooltip"
                            [matTooltipPosition]="'after'"
                        >
                            <span class="font-bold text-emerald-600 text-3xl material-symbols-outlined">
                                add
                            </span>
                        </div>
                    </div>
                    <div class="absolute left-2 mt-36">
                        <div class="cursor-pointer rounded-full bg-gray-300 flex justify-center items-center" style="height: 3rem; width: 3rem;"
                            matTooltip="Other tooltip"
                            [matTooltipPosition]="'after'"
                        >
                            <span   class="font-bold text-emerald-600 text-3xl material-symbols-outlined">
                                person
                            </span>
                        </div>
                    </div>
                    <div class="absolute left-2 mt-52">
                        <div class="cursor-pointer rounded-full bg-gray-300 flex justify-center items-center" style="height: 3rem; width: 3rem;"
                            matTooltip="Other tooltip"
                            [matTooltipPosition]="'after'"
                        >
                            <span class="font-bold text-emerald-600 text-3xl material-symbols-outlined">
                                rocket_launch
                            </span>
                        </div>
                    </div>
                </div>
        </div>

        <div class="basis-64 bg-gray-100">
                <div class="relative">
                    <div class="flex flex-col ml-4 mt-6">
                        <p class="font-bold text-xl">Channels</p>
                        <div class="mt-3 ml-2">
                            <span class="text-blue-500 font-bold text-lg">
                                <span class="text-sm material-symbols-outlined">
                                    add
                                </span> Topics
                            </span>
                                <ul class="ml-5 mt-1">
                                    <li class="text-gray-500 hover:text-blue-400">
                                        <a routerLink="about-me" routerLinkActive="text-red-400"># About me</a>
                                    </li>
                                    <li class="text-gray-500 hover:text-blue-400">
                                        <a routerLink="skills" routerLinkActive="text-red-400"># Skills</a>
                                    </li>
                                    <li class="text-gray-500 hover:text-blue-400">
                                        <a routerLink="projects" routerLinkActive="text-red-400"># Projects</a>
                                    </li>
                                    <li class="text-gray-500 hover:text-blue-400">
                                        <a routerLink="education" routerLinkActive="text-red-400"># Education</a>
                                    </li>
                                </ul>
                        </div>
                        <div class="mt-3 ml-2">
                            <span class="text-blue-500 font-bold text-lg cursor-pointer"
                                    data-bs-toggle="collapse" data-bs-target="#collapseQuestions" aria-expanded="false"
                                    aria-controls="collapseQuestions"
                            >
                                <span class="text-sm material-symbols-outlined">
                                    add
                                </span> Questions
                            </span>
                            <div class="collapse" id="collapseQuestions">
                                <div class="max-w-sm w-44">
                                    <ul class="ml-5 mt-1">
                                        <li class="text-gray-500 hover:text-blue-400">
                                            <a routerLink="questions" routerLinkActive="text-red-400"># General</a>
                                        </li>
                                        <li class="text-gray-500 hover:text-blue-400">
                                            <a routerLink="hardware" routerLinkActive="text-red-400"># Hardware</a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
        </div>

        <div class="basis-full">
            <app-navbar [title]="currentUrl"></app-navbar>
            <div class="container-md bg-gray-200 px-36 py-20 min-h-screen overflow-y-hidden">
                <router-outlet></router-outlet>
            </div>
        </div>


    </div>

</div>
