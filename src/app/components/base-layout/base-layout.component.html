<div class="navbar">
    <div class="navbar-start">
        <div class="dropdown text-white" (click)="onClick()">
            <label tabindex="0" class="btn btn-ghost btn-circle">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
                </svg>
            </label>
        </div>
    </div>
    <!-- <div class="navbar-center">
        <a class="btn btn-ghost normal-case text-xl">nicolás ayala</a>
    </div> -->
    <div class="navbar-end">
        <button class="btn btn-ghost btn-circle">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </button>
        <button class="btn btn-ghost btn-circle">
            <div class="indicator">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span class="badge badge-xs badge-primary indicator-item"></span>
            </div>
        </button>
    </div>
</div>
<div class="drawer bg-gradient-to-r from-[#314755] to-[#26a0da] h-auto md:h-screen">
    <input id="my-drawer" type="checkbox" class="drawer-toggle" [(ngModel)]="openDrawer" />
    <div class="drawer-content">
        <!-- Page content here -->

        <div class="flex h-full items-center">
            <!-- WHITE SIDEBAR -->
            <div class="hidden md:block flex-none bg-white h-64 p-2 rounded-tr-3xl rounded-br-3xl">
                <div (click)="navigateHome()"
                    class="cursor-pointer rounded-full bg-base-300 flex justify-center items-center"
                    style="height: 3rem; width: 3rem;" matTooltip="Home" [matTooltipPosition]="'after'">
                    <span class="font-bold text-white text-3xl material-symbols-outlined">
                        home
                    </span>
                </div>
                <div class="cursor-pointer rounded-full bg-transparent flex justify-center items-center mt-4"
                    style="height: 3rem; width: 3rem;" matTooltip="Github" [matTooltipPosition]="'after'">
                    <div class="avatar">
                        <div class="w-12 rounded-xl">
                            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" />
                        </div>
                    </div>
                </div>
                <div class="cursor-pointer rounded-full bg-transparent flex justify-center items-center mt-4"
                    style="height: 3rem; width: 3rem;" matTooltip="Linkedin" [matTooltipPosition]="'after'">
                    <div class="avatar">
                        <div class="w-12 rounded-xl">
                            <img
                                src="https://e7.pngegg.com/pngimages/524/809/png-clipart-computer-icons-resume-linkedin-logo-job-hunting-others-blue-angle-thumbnail.png" />
                        </div>
                    </div>
                </div>
                <div class="cursor-pointer rounded-full bg-transparent flex justify-center items-center mt-4"
                    style="height: 3rem; width: 3rem;" matTooltip="Resume PDF" [matTooltipPosition]="'after'">
                    <div class="avatar">
                        <div class="w-12 rounded-xl">
                            <img src="https://cdn-icons-png.flaticon.com/512/46/46532.png" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- ROUTER CONTENT -->
            <div class="flex-1 w-auto">
                <router-outlet></router-outlet>
            </div>

        </div>
    </div>
    <div class="drawer-side">
        <label for="my-drawer" class="drawer-overlay"></label>
        <div class="menu p-4 overflow-y-auto w-80 bg-base-100 text-base-content">
            <!-- Sidebar content here -->
            <div class="flex flex-col ml-4 mt-6">
                <p class="font-bold text-xl">Channels</p>
                <div class="mt-3 ml-2">
                    <span class="text-blue-500 font-bold text-lg">
                        <span class="text-sm material-symbols-outlined">
                            add
                        </span> Topics
                    </span>
                    <ul class="ml-5 mt-1">
                        <li class="text-gray-500 hover:text-blue-400">
                            <a routerLink="about-me" routerLinkActive="text-red-400"># About me</a>
                        </li>
                        <li class="text-gray-500 hover:text-blue-400">
                            <a routerLink="skills" routerLinkActive="text-red-400"># Skills</a>
                        </li>
                        <li class="text-gray-500 hover:text-blue-400">
                            <a routerLink="projects" routerLinkActive="text-red-400"># Projects</a>
                        </li>
                        <li class="text-gray-500 hover:text-blue-400">
                            <a routerLink="education" routerLinkActive="text-red-400"># Education</a>
                        </li>
                    </ul>
                </div>
                <div class="mt-3 ml-2">
                    <span class="text-blue-500 font-bold text-lg cursor-pointer" data-bs-toggle="collapse"
                        data-bs-target="#collapseQuestions" aria-expanded="false" aria-controls="collapseQuestions">
                        <span class="text-sm material-symbols-outlined">
                            add
                        </span> Questions
                    </span>
                    <div class="collapse" id="collapseQuestions">
                        <div class="max-w-sm w-100">
                            <ul class="ml-5 mt-1">
                                <li class="text-gray-500 hover:text-blue-400">
                                    <a routerLink="questions" routerLinkActive="text-red-400"># General</a>
                                </li>
                                <li class="text-gray-500 hover:text-blue-400">
                                    <a routerLink="hardware" routerLinkActive="text-red-400"># Hardware</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
